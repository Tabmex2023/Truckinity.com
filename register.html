<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truckinity – Registrierung</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="header-inner">

    <div class="logo-container">
      <img src="assets/logo.png" alt="Truckinity Logo" class="logo">
      <span class="brand-name">Truckinity</span>
    </div>

    <nav class="header-buttons">
      <a href="index.html" class="btn-outline">Home</a>

      <div class="language-switch">
        <button onclick="setLanguage('de')">DE</button>
        <button onclick="setLanguage('en')">EN</button>
        <button onclick="setLanguage('ru')">RU</button>
      </div>
    </nav>

  </div>
</header>

<section class="hero">

  <h1 data-i18n="register"></h1>

  <div class="auth-box">

    <label data-i18n="name_label"></label>
    <input type="text" placeholder="Max Mustermann">

    <label data-i18n="email_label"></label>
    <input type="email" placeholder="Email">

    <label data-i18n="password_label"></label>
    <input type="password" placeholder="••••••••">

    <button class="btn-primary large" data-i18n="register_button"></button>

  </div>

</section>

<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>

</body>
</html>
