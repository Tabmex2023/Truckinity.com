<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truckinity – die Truckercommunity</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#040431">

<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="icon" sizes="192x192" href="assets/icons/icon-192.png">
<link rel="icon" sizes="512x512" href="assets/icons/icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <div class="header-inner">

    <div class="logo-container">
      <img src="assets/logo.png" alt="Truckinity Logo" class="logo">
      <span class="brand-name">Truckinity</span>
    </div>

    <nav class="header-buttons">

      <div class="auth-buttons">
        <a href="login.html" class="btn-outline" data-i18n="login"></a>
        <a href="register.html" class="btn-primary" data-i18n="register"></a>
      </div>

      <div class="language-switch">
        <button onclick="setLanguage('de')">DE</button>
        <button onclick="setLanguage('en')">EN</button>
        <button onclick="setLanguage('ru')">RU</button>
      </div>

    </nav>
  </div>
</header>


<!-- HERO -->
<section class="hero reveal">
  <h1 data-i18n="hero_title"></h1>
  <p data-i18n="hero_text"></p>
  <a href="register.html" class="btn-primary large" data-i18n="hero_cta"></a>
</section>


<!-- PROBLEM -->
<section class="section reveal problem">
  <h2 data-i18n="problem_title"></h2>

  <div class="grid">
    <div class="card">
      <h3 data-i18n="problem_1_title"></h3>
      <p data-i18n="problem_1_text"></p>
    </div>

    <div class="card">
      <h3 data-i18n="problem_2_title"></h3>
      <p data-i18n="problem_2_text"></p>
    </div>

    <div class="card">
      <h3 data-i18n="problem_3_title"></h3>
      <p data-i18n="problem_3_text"></p>
    </div>
  </div>
</section>


<!-- SOLUTION -->
<section class="section reveal solution">
  <h2 data-i18n="solution_title"></h2>

  <div class="grid">
    <div class="card">
      <h3 data-i18n="solution_1_title"></h3>
      <p data-i18n="solution_1_text"></p>
    </div>

    <div class="card">
      <h3 data-i18n="solution_2_title"></h3>
      <p data-i18n="solution_2_text"></p>
    </div>

    <div class="card">
      <h3 data-i18n="solution_3_title"></h3>
      <p data-i18n="solution_3_text"></p>
    </div>
  </div>
</section>


<!-- PRICING -->
<section class="section reveal">
  <h2 data-i18n="pricing_title"></h2>

  <div class="pricing-box">
    <h3 data-i18n="pricing_price"></h3>
    <p data-i18n="pricing_text"></p>
    <a href="register.html" class="btn-primary large" data-i18n="pricing_cta"></a>
  </div>
</section>


<!-- FOOTER -->
<footer class="footer">
  <span data-i18n="footer_text"></span>
</footer>


<!-- Scroll Reveal -->
<script>
const reveals = document.querySelectorAll('.reveal');

window.addEventListener('scroll', () => {
  const trigger = window.innerHeight * 0.85;

  reveals.forEach(section => {
    const top = section.getBoundingClientRect().top;
    if(top < trigger){
      section.classList.add('active');
    }
  });
});
</script>

<!-- i18n Scripts -->
<script src="js/translations.js"></script>
<script src="js/i18n.js"></script>

</body>
</html>
